# .github/workflows/main.yml
name: 🧪 Auto Test CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: 🚀 Run Tests
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: 📦 Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          cache: 'pip'

      # 3. 安装依赖
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      # 4. 运行测试
      - name: 🧪 Run All Tests
        run: |
          pytest ui_tests/ api_tests/ \
            --alluredir=./reports \
            -v --tb=short

      # 5. 上传测试报告
      - name: 📤 Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/
          retention-days: 7